{%extends "base.html"%}

{%block title%} Home {%endblock%}

{%block content%}

{%if error%}
<div class="alert alert-danger text-center mb-3" role="alert" id="error">{{ error }}</div>
{%endif%}

<div class="bg-light border-bottom shadow-sm py-3 px-4 d-flex justify-content-between align-items-center w-100">

    
  <div class="d-flex align-items-center">
    <i class="bi bi-person-circle me-2 fs-5 text-secondary"></i>
    <span class="text-muted">Logged in as</span>
    <strong class="ms-2">{{ username }}</strong>
  </div>

  
  <div class="d-flex align-items-center gap-3">
    <button id="create_task_button" name="create_task_button" class="btn btn-outline-primary px-4 fw-semibold">
      <i class="bi bi-plus-circle me-1"></i> Create Task
    </button>

    <button id="logout_button" name="logout_button" class="btn btn-outline-danger px-4 fw-semibold">
      <i class="bi bi-box-arrow-right me-1"></i> Log Out
    </button>
  </div>
</div>

<div id="tasks_div" name="tasks_div" class="tasks_div d-flex flex-wrap gap-3 pt-4"></div>

<script>
const Status = {
    TODO: "{{ Status.TODO.value }}",
    DOING: "{{ Status.DOING.value }}",
    DONE: "{{ Status.DONE.value }}"
};

function formatDate(dateStr) {
  if (!dateStr || dateStr.trim() === "") { return "Unspecified"; }
  const date = new Date(dateStr);
  if (isNaN(date.getTime())) { return dateStr; }
  // returns the dates in dd/mm/yy format
  return date.toLocaleDateString("en-GB");
};

// UPDATED: load tasks from the /get tasks endpoint in main.py
const taskList = document.getElementById("tasks_div");

async function loadTasks() {    
    const { tasks } = await api('/tasks');
    const tasksAsArray = Array.from(tasks);

    const badgeClasses = {
        "To Do": "bg-primary",
        "Doing": "bg-warning",
        "Done": "bg-success",
    };
    // empty container each iteration so that tasks doesn't stack up
    taskList.replaceChildren();

    tasksAsArray.forEach(task => {    
        const badgeClass = badgeClasses[task.status];

        var content =
                `<div class="card shadow-sm mb-3 border-0" data-id="${task.id}" style="height: 200px; width: 200px;">
                <div class="card-body d-flex flex-column justify-content-center ">
                    <h6 class="card-title mb-1 fw-semibold text-truncate text-center p-2">${task.title}</h6>
                    <p class="card-text text-muted small mb-2 flex-grow-1 overflow-auto"
                    style="max-height: 100px; word-wrap: break-word;">
                    ${task.description}
                    </p>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                    <small class="text-secondary">Due: ${formatDate(task.due_date)}</small>
                    <span class="badge ${badgeClass}">${task.status || "task"}</span>
                    </div>
                </div>
                </div>`;
        taskList.innerHTML += content;
    });
};

loadTasks();

taskList.addEventListener("click", (event) => {
    // stop panel from closing if user clicks button
    if (event.target.closest("button") || event.target.closest("input") || event.target.closest("textarea")) {
        return;
    }

    const card = event.target.closest(".card");
    if (!card) return;

    const body = card.querySelector(".card-body");
    if (body.classList.contains("edit-mode")) {
    closeOpenPanels();
    return;
    }

    event.stopPropagation(); // prevents card from closing immediately
    closeOpenPanels(body);
    openPanel(body);
});

document.getElementById("create_task_button").onclick = function() {
    location.href = "/create_task"
};

document.getElementById("logout_button").onclick = function() {
    location.href = "/logout"
};

function closeOpenPanels(exceptBody = null) {
    document.querySelectorAll("#tasks_div .card-body.edit-mode").forEach(body => {
        if (body === exceptBody) return;
        if (body.dataset.original) {
            body.innerHTML = body.dataset.original;
            delete body.dataset.original;
        }
        body.classList.remove("edit-mode");
    })
}; 

function openPanel(body) {
    title = body.querySelector(".card-title").textContent.trim();
    description = body.querySelector(".card-text").textContent.trim();

    body.dataset.original = body.innerHTML;
    body.classList.add("edit-mode");

    body.innerHTML = 
    `<div class="d-grid gap-2 col-10 mx-auto justify-content-center" data-title=${title} data-description=${description}>
        <button class="btn btn-primary action-edit">Edit Task</button>
        <button class="btn btn-warning action-edit-status">Edit Status</button>
        <button class="btn btn-danger action-delete">Delete Task</button>
    </div>`;
};

function openStatusPanel(body) {
    body.classList.add("edit-status-mode");
    
    body.innerHTML = 
    `<div class="d-grid gap-2 col-10 mx-auto justify-content-center">
        <button class="btn btn-primary action-edit-status status-todo">To Do</button>
        <button class="btn btn-warning action-edit-status status-doing">Doing</button>
        <button class="btn btn-success action-edit-status status-done">Done</button>
    </div>`;
    // const description = description == undefined ? "" : description;
    return { title, description }
};

document.addEventListener("click", (e) => {
  // Ignore clicks that happen inside a card (including buttons, text, etc.)
  if (e.target.closest(".card")) return;

  closeOpenPanels();  // Reverts any card currently in edit mode
});


async function api(path, options = {}) {
  const res = await fetch(path, {
    method: options.method || "GET",
    headers: { "Content-Type": "application/json" },
    body: options.body || null,
    credentials: "include",
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json().catch(() => ({}));
};

const statuses = {
    "status-todo": Status.TODO,
    "status-doing": Status.DOING,
    "status-done": Status.DONE
};

async function handleStatusChange(status, id, body) {
    const { task } = await api(`/tasks/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ status: statuses[status] })
    });

    if (body.dataset.original) {
        body.innerHTML = body.dataset.original;
        delete body.dataset.original;
        body.classList.remove("edit-mode");
    }
    loadTasks();
};

document.addEventListener("click", async (event) => {
    // delete
    if (event.target.classList.contains("action-delete")) {
        event.stopImmediatePropagation();
        const card = event.target.closest(".card");
        if (!card) return;
        const id = card.dataset.id;
        try {
            await api(`/tasks/${id}`, {method: "DELETE"});
            card.remove();
        } catch (err) { console.log(err); }
    };
 
    // done
    if (event.target.classList.contains("action-edit-status")) {
        event.stopImmediatePropagation();
        const card = event.target.closest(".card");
        if (!card) return;

        const body = card.querySelector(".card-body");
        const id = card.dataset.id;

        const targetClasses = ["status-todo", "status-doing", "status-done"];
        const matchedClass = targetClasses.find(cls => event.target.classList.contains(cls));

        if (matchedClass) {
            event.stopImmediatePropagation();
            handleStatusChange(matchedClass, id, body)
        };

        openStatusPanel(body);    
    };
    

    // edit
    if (event.target.classList.contains("action-edit")) {
        console.log("here")
        event.stopImmediatePropagation();
        const card = event.target.closest(".card");
        if (!card) return;
        const body = card.querySelector(".card-body");
        const targetDiv = body.firstElementChild;
        
        const titleInput = targetDiv.dataset.title;
        const descriptionInput = targetDiv.dataset.description == undefined ? "" : targetDiv.dataset.description;
        console.log(titleInput)
        console.log(descriptionInput)

        const id = card.dataset.id;
        const title = body.querySelector("h6")?.textContent?.trim() || titleInput;
        const desc = body.querySelector("p")?.textContent?.trim() || descriptionInput;
        body.classList.add("edit-mode");
        body.innerHTML = ` 
        <div class="w-100">
            <div class="mb-2">
                <input class="form-control form-control-sm" id="edit-title" value="${title}" placeholder="Title">
            </div>
            
            <div class="mb-2">
                <textarea class="form-control form-control-sm" id="edit-desc" rows="3" placeholder="Description">${desc}</textarea>
            </div>

            <div class="d-flex gap-2">
            <button class="btn btn-primary btn-sm save-edit">Save</button>
            </div>
        </div>`
    };

    // save
    if (event.target.classList.contains("save-edit")) {
        event.stopImmediatePropagation();
        const card = event.target.closest(".card");
        if (!card) return;
        const body = card.querySelector(".card-body")
        const id = card.dataset.id;
        const newTitle = body.querySelector("#edit-title").value.trim();
        const newDesc = body.querySelector("#edit-desc").value.trim();

        try {
            const { task } = await api(`/tasks/${id}`, {
                method: "PATCH",
                body: JSON.stringify({ title: newTitle, description: newDesc })
            });

            body.innerHTML = body.dataset.original;
            body.classList.remove("edit-mode");
            delete body.dataset.original;

            card.querySelector(".card-title").textContent = task.title;
            card.querySelector(".card-text").textContent = task.description || "";            
        } catch (err) { console.log(err); }
    };
});
</script>
{%endblock%}
